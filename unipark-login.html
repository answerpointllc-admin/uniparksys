<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UniPark — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--emerald:#10B981;--emerald-dk:#059669;--emerald-lt:#D1FAE5;--orange:#F97316;--orange-dk:#EA580C;--slate:#475569;--bg:#F0FDF4;--surface:#FFF;--border:#D1FAE5;--text:#1E293B;--text2:#475569;--text3:#94A3B8;--r:8px}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(145deg,#F0FDF4,#ECFDF5,#FFF7ED);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
h1,h2{font-family:'Montserrat',sans-serif}
body::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,.07),transparent 70%);top:-120px;right:-80px}
body::after{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,.05),transparent 70%);bottom:-80px;left:-60px}
.login-wrap{position:relative;z-index:2;width:100%;max-width:420px;padding:20px}
.card{background:var(--surface);border-radius:16px;box-shadow:0 4px 32px rgba(16,185,129,.08),0 1px 3px rgba(0,0,0,.04);overflow:hidden}
.card-header{background:linear-gradient(135deg,var(--emerald),var(--emerald-dk));padding:28px 32px;text-align:center;position:relative;overflow:hidden}
.card-header::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06);top:-80px;right:-40px}
.logo{width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;backdrop-filter:blur(8px);font-family:'Montserrat',sans-serif;font-size:15px;font-weight:800;color:#fff;letter-spacing:-.5px}
.card-header h1{color:#fff;font-size:22px;font-weight:800}
.card-header p{color:rgba(255,255,255,.75);font-size:11px;margin-top:4px}
.card-body{padding:28px 32px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.3px}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--text);background:#F0FDF4;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--emerald);box-shadow:0 0 0 3px rgba(16,185,129,.1);background:#fff}
.field input::placeholder{color:var(--text3)}
.remember{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:12px}
.remember label{display:flex;align-items:center;gap:6px;color:var(--text2);cursor:pointer}
.remember input[type=checkbox]{accent-color:var(--emerald);width:15px;height:15px}
.remember a{color:var(--emerald);text-decoration:none;font-weight:500}
.remember a:hover{text-decoration:underline}
.btn{width:100%;padding:12px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--emerald),var(--emerald-dk));color:#fff;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(16,185,129,.3)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.sso-btn{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--r);background:#fff;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color .15s}
.sso-btn:hover{border-color:var(--orange)}
.card-footer{padding:16px 32px;background:#F0FDF4;border-top:1px solid var(--border);text-align:center}
.card-footer .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(249,115,22,.08);color:var(--orange-dk);border:1px solid rgba(249,115,22,.15)}
.card-footer p{font-size:9px;color:var(--text3);margin-top:8px}
.create{text-align:center;margin-top:16px;font-size:12px;color:var(--text2)}
.create a{color:var(--orange);font-weight:600;text-decoration:none}
.otp-note{text-align:center;font-size:10px;color:var(--text3);margin-top:8px}
</style>
</head>
<body>
<div class="login-wrap">
<div class="card">
<div class="card-header">
<div class="logo">UPS</div>
<h1>UniPark</h1>
<p>Universal Parking Systems</p>
</div>
<div class="card-body">
<div class="field"><label>Username</label><input type="text" placeholder="Enter your username"></div>
<div class="field"><label>Password</label><input type="password" placeholder="••••••••"></div>
<div class="remember"><label><input type="checkbox"> Remember me</label><a href="#">Forgot password?</a></div>
<button class="btn">Sign In</button>
<div class="otp-note">2FA verification via email OTP after sign-in</div>
<div class="divider">or</div>
<button class="sso-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Sign in with SSO / SAML</button>
</div>
<div class="card-footer">
<span class="badge">🅿 Smart Parking</span>
<p>The AnswerPoint LLC</p>
</div>
</div>
<div class="create">New here? <a href="#">Create Account</a></div>
</div>
</body>
</html>
