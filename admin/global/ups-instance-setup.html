<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UPS Instance Setup</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{--bg:#F5F7FA;--card:#FFF;--bdr:#E2E8F0;--navy:#1B2A4A;--teal:#2BA4B5;--grn:#48BB78;--red:#C8102E;--txt:#2D3748;--mut:#718096}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);padding:16px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:16px;margin-bottom:12px}
.tabs{display:flex;gap:2px;margin-bottom:16px;background:#E2E8F0;border-radius:6px;padding:3px}
.tab{padding:6px 14px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--mut)}.tab.active{background:#FFF;color:var(--navy);box-shadow:0 1px 2px rgba(0,0,0,.1)}
label{display:block;font-size:11px;font-weight:600;color:var(--navy);margin-bottom:3px}
input,select{width:100%;padding:7px 10px;border:1px solid var(--bdr);border-radius:5px;font-size:12px;margin-bottom:10px}
.btn{padding:7px 16px;border:none;border-radius:5px;font-weight:600;font-size:11px;cursor:pointer}
.btn-pri{background:var(--teal);color:#FFF}.btn-sec{background:#EDF2F7;color:var(--navy)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.step{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--bdr);border-radius:6px;margin-bottom:4px;font-size:11px}
.step-n{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.step-n.done{background:var(--grn);color:#FFF}.step-n.run{background:#ECC94B;color:#744210}.step-n.wait{background:#EDF2F7;color:var(--mut)}
.prog{height:4px;background:#E2E8F0;border-radius:2px;margin:8px 0}.prog-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--grn));border-radius:2px;transition:width .4s}
.log{background:#1A202C;border-radius:6px;padding:8px;font-family:monospace;font-size:10px;color:#68D391;max-height:200px;overflow-y:auto;line-height:1.7}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600}
.badge.g{background:#C6F6D5;color:#22543D}.badge.o{background:#FEFCBF;color:#744210}.badge.b{background:#BEE3F8;color:#2A4365}
</style></head><body><div id="root"></div>
<script type="text/babel">
const {useState}=React;
const ARCHS=[{id:'single',nm:'Single Server',ic:'🖥️'},{id:'split',nm:'Split (App+DB)',ic:'🔀'},{id:'cluster',nm:'Clustered',ic:'🌐'}];
const STEPS=['Validate Config','Create Database','Schema Migration','Seed Reference Data','Create Admin User','Configure API Keys','Setup Webhooks','Generate Verification Key','Run Health Check','Finalize'];
function App(){
const [tab,setTab]=useState('provision');
const [f,sF]=useState({cn:'',ce:'',arch:'single',reg:'us-east',dh:'localhost',dp:'3306',dn:'',au:'',ae:'',ap:'',plan:'professional'});
const [step,setSt]=useState(0);const [run,setRun]=useState(false);const [logs,setLogs]=useState([]);
const [insts]=useState([{id:'UPS-2024-001',cl:'Metro Parking Co',st:'Active',dt:'2025-11-15',pl:'Enterprise',ar:'cluster'},{id:'UPS-2024-002',cl:'CityPark Solutions',st:'Active',dt:'2025-12-01',pl:'Professional',ar:'split'},{id:'UPS-2024-003',cl:'Harbor Lots Inc',st:'Provisioning',dt:'2026-02-20',pl:'Starter',ar:'single'}]);
const add=(m)=>setLogs(p=>[...p,`[${new Date().toLocaleTimeString()}] ${m}`]);
const go=async()=>{if(!f.cn||!f.ae){alert('Client name and admin email required');return;}setRun(true);setSt(0);setLogs([]);for(let i=0;i<STEPS.length;i++){setSt(i);add(`[${i+1}/${STEPS.length}] ${STEPS[i]}...`);await new Promise(r=>setTimeout(r,700+Math.random()*500));if(i===1)add(`Database created on ${f.dh}`);if(i===4)add(`Admin '${f.ae}' created`);if(i===7)add('Key: VK-'+Math.random().toString(36).slice(2,10).toUpperCase());if(i===9)add('✓ Instance provisioned: UPS-'+Date.now().toString(36).toUpperCase());}setSt(STEPS.length);setRun(false);};
const s=(k,v)=>sF({...f,[k]:v});
return <div>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><div><div style={{fontSize:16,fontWeight:700,color:'var(--navy)'}}>🔧 Instance Setup</div><div style={{fontSize:10,color:'var(--mut)'}}>Provision new UniPark customer instances</div></div></div>
<div className="tabs">{['provision','dashboard','passwords','log'].map(t=><div key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t==='provision'?'New Instance':t==='dashboard'?'Instances':t==='passwords'?'Passwords':'Log'}</div>)}</div>
{tab==='provision'&&<div>
<div className="card"><div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Client Info</div><div className="grid2"><div><label>Client Name *</label><input value={f.cn} onChange={e=>s('cn',e.target.value)} placeholder="Metro Parking Co"/></div><div><label>Contact Email *</label><input value={f.ce} onChange={e=>s('ce',e.target.value)} placeholder="admin@client.com"/></div><div><label>Plan</label><select value={f.plan} onChange={e=>s('plan',e.target.value)}><option value="starter">Starter</option><option value="professional">Professional</option><option value="enterprise">Enterprise</option></select></div><div><label>Region</label><select value={f.reg} onChange={e=>s('reg',e.target.value)}><option value="us-east">US East</option><option value="us-west">US West</option></select></div></div></div>
<div className="card"><div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Architecture</div><div style={{display:'flex',gap:8}}>{ARCHS.map(a=><div key={a.id} onClick={()=>s('arch',a.id)} style={{flex:1,padding:8,border:`2px solid ${f.arch===a.id?'var(--teal)':'var(--bdr)'}`,borderRadius:6,cursor:'pointer',textAlign:'center',background:f.arch===a.id?'#E6FFFA':'transparent'}}><div style={{fontSize:18}}>{a.ic}</div><div style={{fontSize:10,fontWeight:700}}>{a.nm}</div></div>)}</div></div>
<div className="card"><div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Database</div><div className="grid2"><div><label>Host</label><input value={f.dh} onChange={e=>s('dh',e.target.value)}/></div><div><label>Port</label><input value={f.dp} onChange={e=>s('dp',e.target.value)}/></div></div></div>
<div className="card"><div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Admin Account</div><div className="grid2"><div><label>Name</label><input value={f.au} onChange={e=>s('au',e.target.value)}/></div><div><label>Email *</label><input value={f.ae} onChange={e=>s('ae',e.target.value)}/></div></div></div>
{run&&<div className="card"><div style={{fontSize:12,fontWeight:700,marginBottom:4}}>Progress</div><div className="prog"><div className="prog-bar" style={{width:`${(step/STEPS.length)*100}%`}}/></div>{STEPS.map((s,i)=><div key={i} className="step"><div className={`step-n ${i<step?'done':i===step&&run?'run':'wait'}`}>{i<step?'✓':i+1}</div>{s}</div>)}</div>}
<div style={{display:'flex',gap:6,marginTop:8}}><button className="btn btn-pri" onClick={go} disabled={run}>{run?'Provisioning...':'🚀 Start'}</button><button className="btn btn-sec" onClick={()=>{sF({cn:'',ce:'',arch:'single',reg:'us-east',dh:'localhost',dp:'3306',dn:'',au:'',ae:'',ap:'',plan:'professional'});setLogs([]);setSt(0)}}>Reset</button></div>
</div>}
{tab==='dashboard'&&<div className="card"><div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Active Instances ({insts.length})</div><table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}><thead><tr>{['ID','Client','Plan','Arch','Status','Created'].map(h=><th key={h} style={{textAlign:'left',padding:'6px',color:'var(--mut)',borderBottom:'2px solid var(--bdr)'}}>{h}</th>)}</tr></thead><tbody>{insts.map(i=><tr key={i.id} style={{borderBottom:'1px solid #F0F0F0'}}><td style={{padding:'6px',fontFamily:'monospace',fontWeight:600}}>{i.id}</td><td style={{padding:'6px'}}>{i.cl}</td><td style={{padding:'6px'}}><span className={`badge ${i.pl==='Enterprise'?'b':i.pl==='Professional'?'g':'o'}`}>{i.pl}</span></td><td style={{padding:'6px'}}>{i.ar}</td><td style={{padding:'6px'}}><span className={`badge ${i.st==='Active'?'g':'o'}`}>{i.st}</span></td><td style={{padding:'6px',color:'var(--mut)'}}>{i.dt}</td></tr>)}</tbody></table></div>}
{tab==='passwords'&&<div className="card"><div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Password Management</div><div className="grid2"><div><label>Instance</label><select>{insts.map(i=><option key={i.id}>{i.id} ({i.cl})</option>)}</select></div><div><label>Action</label><select><option>Reset Admin Password</option><option>Rotate API Key</option><option>Reset Verification Key</option></select></div></div><button className="btn btn-pri" style={{background:'var(--red)',marginTop:4}}>⚠️ Execute</button></div>}
{tab==='log'&&<div className="card"><div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Setup Log</div><div className="log">{logs.length===0?<div style={{color:'var(--mut)'}}>No activity yet</div>:logs.map((l,i)=><div key={i}>{l}</div>)}</div></div>}
</div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<!-- PARKER AI WIDGET -->
<style>
.parker-btn{position:fixed;bottom:20px;right:20px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#1B2A4A,#2BA4B5);color:#FFF;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px rgba(43,164,181,.4);z-index:9000;font-size:22px;transition:transform .2s;border:none}
.parker-btn:hover{transform:scale(1.08)}
.parker-badge{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:#E8952E;border:2px solid #FFF}
.parker-panel{display:none;position:fixed;bottom:88px;right:20px;width:340px;max-height:480px;background:#FFF;border:1px solid #E2E8F0;border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.15);z-index:9001;overflow:hidden;flex-direction:column}
.parker-panel.show{display:flex}
.parker-hdr{background:linear-gradient(135deg,#1B2A4A,#2B4C6F);padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.parker-hdr-info{display:flex;align-items:center;gap:10px}
.parker-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2BA4B5,#1B8A99);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#FFF}
.parker-hdr-text .pname{font-size:14px;font-weight:700;color:#FFF}
.parker-hdr-text .psub{font-size:10px;color:rgba(255,255,255,.5)}
.parker-close{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:18px;line-height:1}
.parker-close:hover{color:#FFF}
.parker-msgs{flex:1;overflow-y:auto;padding:12px;background:#F7FAFC;min-height:260px;max-height:320px}
.pmsg-bot{display:flex;gap:8px;margin-bottom:10px}
.pmsg-bot .pbubble{background:#FFF;border:1px solid #E2E8F0;border-radius:12px;border-bottom-left-radius:4px;padding:10px 12px;font-size:12px;color:#2D3748;line-height:1.6;max-width:230px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pmsg-user{display:flex;justify-content:flex-end;margin-bottom:10px}
.pmsg-user .pbubble{background:linear-gradient(135deg,#2BA4B5,#1B8A99);color:#FFF;border-radius:12px;border-bottom-right-radius:4px;padding:10px 12px;font-size:12px;line-height:1.6;max-width:230px}
.parker-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.parker-chip{padding:5px 10px;background:#EBF8FF;border:1px solid #BEE3F8;border-radius:14px;color:#2BA4B5;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.parker-chip:hover{background:#BEE3F8}
.parker-input-row{padding:8px;border-top:1px solid #E2E8F0;display:flex;gap:6px;background:#FFF}
.parker-input{flex:1;border:1px solid #E2E8F0;border-radius:20px;padding:8px 14px;font-size:12px;font-family:inherit;outline:none;color:#2D3748;background:#F7FAFC;transition:border .2s}
.parker-input:focus{border-color:#2BA4B5}
.parker-send{width:34px;height:34px;border-radius:50%;background:#2BA4B5;color:#FFF;border:none;cursor:pointer;font-size:14px;flex-shrink:0;transition:background .15s}
.parker-send:hover{background:#1B8A99}
@media(max-width:768px){.parker-panel{width:calc(100% - 32px);right:16px;left:16px}}
</style>
<button class="parker-btn" onclick="toggleParker()" aria-label="Chat with Parker">💬<span class="parker-badge"></span></button>
<div class="parker-panel" id="parkerPanel">
  <div class="parker-hdr">
    <div class="parker-hdr-info">
      <div class="parker-avatar">P</div>
      <div class="parker-hdr-text"><div class="pname">Parker — UniPark AI</div><div class="psub">AI-powered · Instant answers</div></div>
    </div>
    <button class="parker-close" onclick="toggleParker()">✕</button>
  </div>
  <div class="parker-msgs" id="parkerMsgs">
    <div class="pmsg-bot"><div class="pbubble">Hi! I'm Parker, UniPark's AI assistant. Ask me anything about the platform, pricing, or your parking operation.</div></div>
    <div class="parker-chips">
      <span class="parker-chip" onclick="parkerQuick('How does dynamic pricing work?')">Dynamic pricing</span>
      <span class="parker-chip" onclick="parkerQuick('What does the Pro plan include?')">Pro plan</span>
      <span class="parker-chip" onclick="parkerQuick('How does IoT occupancy work?')">IoT sensors</span>
      <span class="parker-chip" onclick="parkerQuick('How long does setup take?')">Setup time</span>
    </div>
  </div>
  <div class="parker-input-row">
    <input class="parker-input" id="parkerIn" placeholder="Ask about UniPark..." onkeydown="if(event.key==='Enter')parkerSend()">
    <button class="parker-send" onclick="parkerSend()">↑</button>
  </div>
</div>
<script>
if(!window._parkerLoaded){window._parkerLoaded=true;
function toggleParker(){document.getElementById('parkerPanel').classList.toggle('show')}
function parkerQuick(t){document.getElementById('parkerIn').value=t;parkerSend()}
async function parkerSend(){
  var inp=document.getElementById('parkerIn'),t=inp.value.trim();if(!t)return;inp.value='';
  var c=document.getElementById('parkerMsgs');
  c.innerHTML+='<div class="pmsg-user"><div class="pbubble">'+t+'</div></div>';
  c.innerHTML+='<div class="pmsg-bot" id="pTyping"><div class="pbubble" style="color:#A0AEC0">Parker is thinking...</div></div>';
  c.scrollTop=c.scrollHeight;
  var reply='';
  try{
    var r=await fetch('https://answerpointintelligence.ai/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t,product:'parker',history:[]})});
    var d=await r.json();reply=d&&(d.reply||d.message)||'';
  }catch(e){}
  if(!reply){
    var canned={'dynamic pricing':'Our AI-driven dynamic pricing adjusts rates based on real-time demand, events, and competitor pricing. Operators typically see 20-35% revenue uplift in the first 90 days.','pro plan':'The Professional plan ($499/mo) includes up to 15 facilities, dynamic pricing AI, IoT sensor integration, priority support, and custom branding.','iot':'UniPark integrates with standard parking sensors via MQTT. Real-time occupancy data flows into your dashboard across every lot, level, and zone.','setup':'Most operators are live within 2-3 business days. Our onboarding team handles everything — no technical team required on your end.'};
    var key=Object.keys(canned).find(function(k){return t.toLowerCase().indexOf(k)>=0});
    reply=canned[key]||'Great question! UniPark covers booking, dynamic pricing, IoT occupancy, and analytics. Would you like to request a demo or learn more about a specific feature?';
  }
  var el=document.getElementById('pTyping');if(el)el.remove();
  c.innerHTML+='<div class="pmsg-bot"><div class="pbubble">'+reply+'</div></div>';
  c.scrollTop=c.scrollHeight;
}
}
</script>

</body></html>
