<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>UniPark — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1B2A4A;--teal:#2BA4B5;--orange:#E8952E;--dark:#0f1e38;--border:#E2E8F0;--muted:#718096;--text:#2D3748;--bg:#F7FAFC}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:100%;max-width:400px;padding:40px 36px;text-align:center}
.logo{margin-bottom:24px}
.logo img{height:40px}
.logo-text{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:800;color:var(--navy)}
.logo-text span{color:var(--teal)}
h1{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px}
.sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);transition:border-color .2s;outline:none}
.field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(43,164,181,.1)}
.field input::placeholder{color:#CBD5E0}
.btn-sign{width:100%;padding:14px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .2s;margin-top:8px}
.btn-sign:hover{background:#228B9D}
.btn-sign:disabled{background:#A0AEC0;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.sso-btn{width:100%;padding:12px;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.sso-btn:hover{border-color:var(--teal);color:var(--teal)}
.links{margin-top:24px;font-size:13px;color:var(--muted)}
.links a{color:var(--teal);text-decoration:none;font-weight:600}
.links a:hover{text-decoration:underline}
.error{background:#FFF5F5;border:1px solid #FEB2B2;border-radius:8px;padding:10px 14px;font-size:13px;color:#C53030;margin-bottom:16px;display:none;text-align:left}
.otp-section{display:none}
.otp-info{background:#EBF8FF;border:1px solid #BEE3F8;border-radius:8px;padding:10px 14px;font-size:13px;color:#2B6CB0;margin-bottom:16px;text-align:left}
.otp-input{text-align:center;font-size:24px;letter-spacing:8px;font-weight:700}
.back-link{display:inline-block;margin-top:12px;font-size:12px;color:var(--muted);text-decoration:none}
.back-link:hover{color:var(--teal)}
.footer{margin-top:24px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 50'%3E%3Cpath d='M20,3 L38,10 L38,28 Q20,38 2,28 L2,10 Z' fill='%231B2A4A'/%3E%3Cpath d='M20,7 L34,13 L34,26 Q20,35 6,26 L6,13 Z' fill='none' stroke='%232BA4B5' stroke-width='1'/%3E%3Ctext x='20' y='22' text-anchor='middle' fill='%232BA4B5' font-family='Arial' font-size='11' font-weight='bold'%3EUPS%3C/text%3E%3Ctext x='20' y='30' text-anchor='middle' fill='%23E8952E' font-family='Arial' font-size='6'%3ESaaS%3C/text%3E%3Ctext x='48' y='20' font-family='Montserrat,sans-serif' font-size='16' font-weight='800' fill='%231B2A4A'%3EUni%3C/text%3E%3Ctext x='78' y='20' font-family='Montserrat,sans-serif' font-size='16' font-weight='800' fill='%232BA4B5'%3EPark%3C/text%3E%3C/svg%3E" alt="UniPark"/>
  </div>
  <h1>Sign in to your account</h1>
  <div class="sub">Enter your credentials below</div>

  <div id="errorMsg" class="error"></div>

  <!-- Step 1: Username + Password -->
  <div id="loginStep">
    <div class="field">
      <label>Username or Email</label>
      <input type="text" id="username" placeholder="you@example.com" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>
    <button class="btn-sign" id="signBtn" onclick="handleLogin()">Sign In</button>
    <div class="divider">or</div>
    <button class="sso-btn" onclick="handleSSO()">🔐 Sign in with SSO / SAML</button>
  </div>

  <!-- Step 2: 2FA OTP -->
  <div id="otpStep" class="otp-section">
    <div class="otp-info">A verification code has been sent to your email. Enter it below.</div>
    <div class="field">
      <label>Verification Code</label>
      <input type="text" id="otpCode" class="otp-input" placeholder="000000" maxlength="6" autocomplete="one-time-code">
    </div>
    <button class="btn-sign" onclick="handleOTP()">Verify</button>
    <a href="#" class="back-link" onclick="resendOTP();return false">Resend code</a>
  </div>

  <div class="links">
    <a href="/login/?forgot=1">Forgot password?</a><br><br>
    Don't have an account? <a href="/login/?signup=1">Create one</a><br>
    <a href="/" class="back-link">← Back to uniparksystems.com</a>
  </div>
  <div class="footer">Universal Parking Systems &bull; The AnswerPoint LLC</div>
</div>

<script>
function showError(msg){const e=document.getElementById('errorMsg');e.textContent=msg;e.style.display='block'}
function hideError(){document.getElementById('errorMsg').style.display='none'}

function handleLogin(){
  hideError();
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  if(!u||!p){showError('Please enter your username and password.');return}
  document.getElementById('signBtn').disabled=true;
  document.getElementById('signBtn').textContent='Signing in...';
  setTimeout(()=>{
    document.getElementById('loginStep').style.display='none';
    document.getElementById('otpStep').style.display='block';
    document.getElementById('otpCode').focus();
  },800);
}

function handleOTP(){
  hideError();
  const code=document.getElementById('otpCode').value.trim();
  if(!code||code.length<6){showError('Please enter the 6-digit code.');return}
  // In production: POST to /api/auth/verify-otp
  // On success: redirect based on user role (server decides)
  window.location.href='/app/';
}

function handleSSO(){
  // In production: redirect to SSO provider
  showError('SSO integration pending configuration.');
}

function resendOTP(){
  const info=document.querySelector('.otp-info');
  info.textContent='A new code has been sent to your email.';
  setTimeout(()=>{info.textContent='A verification code has been sent to your email. Enter it below.'},3000);
}

document.getElementById('password').addEventListener('keyup',e=>{if(e.key==='Enter')handleLogin()});
document.getElementById('otpCode').addEventListener('keyup',e=>{if(e.key==='Enter')handleOTP()});
</script>
</body></html>
